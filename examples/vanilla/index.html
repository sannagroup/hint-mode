<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hint-mode · vanilla example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
      }
      button,
      input,
      select,
      textarea,
      a {
        padding: 0.5rem 0.75rem;
        border-radius: 0.375rem;
        border: 1px solid #d4d4d4;
        background: white;
        font: inherit;
      }
      button {
        background: #2563eb;
        color: white;
        border: none;
        cursor: pointer;
      }
      a {
        display: inline-block;
        background: #16a34a;
        color: white;
        text-decoration: none;
      }
      kbd {
        font-family: ui-monospace, Menlo, monospace;
        padding: 1px 4px;
        background: #f4f4f5;
        border: 1px solid #d4d4d4;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h1>hint-mode · vanilla example</h1>
    <p>Press <kbd>f</kbd> to activate. Type a label to click. <kbd>Esc</kbd> to cancel.</p>
    <div class="grid">
      <button>Save</button>
      <button>Cancel</button>
      <a href="#nope">Open</a>
      <input placeholder="Search" />
      <select>
        <option>One</option>
        <option>Two</option>
      </select>
      <textarea placeholder="Notes"></textarea>
      <button data-hint="OP">Pinned to OP</button>
      <button data-hint="SR">Pinned to SR</button>
      <button>Auto-assigned</button>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
