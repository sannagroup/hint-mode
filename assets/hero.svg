    <text x="340" y="308">Search organizations…</text>

    <rect x="724" y="284" width="124" height="40" rx="8" fill="#ffffff" stroke="#d8d2bf"/>
    <text x="740" y="308">2026</text>
    <path d="M826 302 l8 8 l8 -8" fill="none" stroke="#7c6e54" stroke-width="1.5"/>
  </g>

  <g font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" fill="#3a2e1c">
    <rect x="324" y="346" width="252" height="40" rx="8" fill="#ffffff" stroke="#ece4cf"/>
    <text x="340" y="370">Acme AS</text>

    <rect x="588" y="346" width="252" height="40" rx="8" fill="#ffffff" stroke="#ece4cf"/>
    <text x="604" y="370">Globex Holdings</text>

    <rect x="852" y="346" width="252" height="40" rx="8" fill="#ffffff" stroke="#ece4cf"/>
    <text x="868" y="370">Initech AS</text>
  </g>

