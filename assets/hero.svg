<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="link-hints demo: a UI with small orange labels over buttons and inputs, with the F key pressed">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf9f4"/>
      <stop offset="1" stop-color="#f1ece1"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fafaf7"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#382b1c" flood-opacity="0.08"/>
    </filter>
    <filter id="badgeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <g filter="url(#cardShadow)">
    <rect x="64" y="64" rx="14" ry="14" width="1072" height="352" fill="url(#card)" stroke="#e3decd" stroke-width="1"/>
  </g>

  <rect x="64" y="64" rx="14" ry="14" width="1072" height="44" fill="#f4f0e6" stroke="#e3decd" stroke-width="1"/>
  <rect x="64" y="100" width="1072" height="8" fill="#f4f0e6"/>
  <circle cx="92" cy="86" r="6" fill="#f7baa3"/>
  <circle cx="112" cy="86" r="6" fill="#f5d49a"/>
  <circle cx="132" cy="86" r="6" fill="#bfd9b8"/>
  <text x="600" y="91" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#7e6f55">app.example.com</text>

  <rect x="80" y="124" width="220" height="276" rx="10" fill="#faf6ec" stroke="#ece4cf" stroke-width="1"/>
  <text x="100" y="156" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="700" fill="#3a2e1c">Admin</text>

  <g font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" fill="#3a2e1c">
    <rect x="92" y="180" width="196" height="36" rx="8" fill="#efe7d2"/>
    <circle cx="110" cy="198" r="5" fill="#3a2e1c"/>
    <text x="130" y="203">Dashboard</text>

    <circle cx="110" cy="244" r="5" fill="#a89678"/>
    <text x="130" y="249" fill="#5a4d36">Organizations</text>

    <circle cx="110" cy="280" r="5" fill="#a89678"/>
    <text x="130" y="285" fill="#5a4d36">Members</text>

    <circle cx="110" cy="316" r="5" fill="#a89678"/>
    <text x="130" y="321" fill="#5a4d36">Reports</text>

    <circle cx="110" cy="352" r="5" fill="#a89678"/>
    <text x="130" y="357" fill="#5a4d36">Settings</text>
  </g>

  <text x="324" y="158" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="20" font-weight="700" fill="#2a2010">Annual reports</text>
  <text x="324" y="184" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13" fill="#7c6e54">Press F to navigate by keyboard</text>

  <g font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="14" font-weight="600">
    <rect x="324" y="220" width="118" height="40" rx="8" fill="#1f1a0e"/>
    <text x="383" y="245" text-anchor="middle" fill="#fffbef">Save draft</text>

    <rect x="458" y="220" width="118" height="40" rx="8" fill="#ffffff" stroke="#d8d2bf"/>
