    <g filter="url(#badgeShadow)"><rect x="84" y="236" width="22" height="14" rx="3" fill="#e96a32"/><text x="95" y="246" text-anchor="middle">OR</text></g>
    <g filter="url(#badgeShadow)"><rect x="84" y="272" width="22" height="14" rx="3" fill="#e96a32"/><text x="95" y="282" text-anchor="middle">ME</text></g>
    <g filter="url(#badgeShadow)"><rect x="84" y="308" width="22" height="14" rx="3" fill="#e96a32"/><text x="95" y="318" text-anchor="middle">RP</text></g>
    <g filter="url(#badgeShadow)"><rect x="84" y="344" width="22" height="14" rx="3" fill="#e96a32"/><text x="95" y="354" text-anchor="middle">SE</text></g>

    <g filter="url(#badgeShadow)"><rect x="316" y="232" width="22" height="14" rx="3" fill="#e96a32"/><text x="327" y="242" text-anchor="middle">SD</text></g>
    <g filter="url(#badgeShadow)"><rect x="450" y="232" width="22" height="14" rx="3" fill="#e96a32"/><text x="461" y="242" text-anchor="middle">CA</text></g>
    <g filter="url(#badgeShadow)"><rect x="584" y="232" width="22" height="14" rx="3" fill="#e96a32"/><text x="595" y="242" text-anchor="middle">PB</text></g>

    <g filter="url(#badgeShadow)"><rect x="316" y="296" width="22" height="14" rx="3" fill="#e96a32"/><text x="327" y="306" text-anchor="middle">SC</text></g>
    <g filter="url(#badgeShadow)"><rect x="716" y="296" width="22" height="14" rx="3" fill="#e96a32"/><text x="727" y="306" text-anchor="middle">YR</text></g>

    <g filter="url(#badgeShadow)"><rect x="316" y="358" width="22" height="14" rx="3" fill="#e96a32"/><text x="327" y="368" text-anchor="middle">AC</text></g>
    <g filter="url(#badgeShadow)"><rect x="580" y="358" width="22" height="14" rx="3" fill="#e96a32"/><text x="591" y="368" text-anchor="middle">GX</text></g>
    <g filter="url(#badgeShadow)"><rect x="844" y="358" width="22" height="14" rx="3" fill="#e96a32"/><text x="855" y="368" text-anchor="middle">IN</text></g>
  </g>

  <g transform="translate(1014, 414)">
    <rect x="0" y="0" width="86" height="36" rx="8" fill="#1f1a0e" stroke="#1f1a0e"/>
    <text x="14" y="22" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="11" fill="#cdc1a4">Press</text>
    <rect x="50" y="6" width="22" height="22" rx="5" fill="#fffbef" stroke="#3a2e1c" stroke-width="1.5"/>
    <text x="61" y="22" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#1f1a0e">F</text>
